server {
    listen 80;
    server_name _;

    # Docker's embedded DNS. Using a resolver + variable forces nginx to
    # re-resolve upstream hostnames on each request (subject to valid=)
    # instead of caching the IP once at config load / worker start. Without
    # this, recreating a service (new container = new internal IP) leaves
    # nginx routing to a dead or wrong IP until nginx itself is recreated.
    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $api_upstream api:8080;
        proxy_pass http://$api_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/ {
        set $admin_upstream admin:3000;
        proxy_pass http://$admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        set $user_upstream user:3000;
        proxy_pass http://$user_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
