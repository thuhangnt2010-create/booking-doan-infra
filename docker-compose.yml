services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: booking_doan
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking_doan"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9001:9001"

  migrate:
    image: migrate/migrate:v4.17.1
    volumes:
      - ../booking-doan-be/migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://booking:${POSTGRES_PASSWORD}@postgres:5432/booking_doan?sslmode=disable",
        "up",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../booking-doan-be
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://booking:${POSTGRES_PASSWORD}@postgres:5432/booking_doan?sslmode=disable
      REDIS_ADDR: redis:6379
      PUBLIC_USER_URL: ${PUBLIC_USER_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  admin:
    build:
      context: ../booking-doan-fe/admin
    environment:
      VITE_API_BASE: /api
    depends_on:
      - api

  user:
    build:
      context: ../booking-doan-fe/user
    environment:
      VITE_API_BASE: /api
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - admin
      - user

volumes:
  pg-data:
  minio-data:
